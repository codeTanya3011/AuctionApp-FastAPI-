version: '3.8'

services:
  db_container3:
    image: postgres:15-alpine
    container_name: auction_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NAME}
      POSTGRES_LOG_STATEMENT: all
    ports:
      - "5436:5432"
    volumes:
      - auction_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: fastapi_auction_app
    restart: always
    ports:
      - "8080:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn auction_app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db_container3

volumes:
  auction_data: